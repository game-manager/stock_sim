<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者画面 - StockSim</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0e17;
            color: #e0e8f0;
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            min-height: 100vh;
        }

        /* ─── ログイン ─── */
        #admin-login {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #1a0f29 0%, #0a0e17 70%);
        }
        .login-box {
            background: #111827; border: 1px solid #2d1f5e;
            border-radius: 16px; padding: 40px 36px;
            width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px #0008;
        }
        .login-box h1 { text-align: center; color: #a78bfa; font-size: 22px; letter-spacing: 2px; margin-bottom: 6px; }
        .login-box .subtitle { text-align: center; color: #4b5563; font-size: 12px; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; color: #6b7280; font-size: 11px; letter-spacing: 1px; margin-bottom: 6px; }
        .form-group input {
            width: 100%; padding: 10px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #2d1f5e; border-radius: 8px; font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #7c3aed; }
        .auth-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; border: none; border-radius: 8px;
            font-size: 15px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; margin-top: 8px; transition: all 0.2s;
        }
        .auth-btn:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
        #login-error { color: #f87171; font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }

        /* ─── メイン ─── */
        #admin-main { display: none; }

        .header {
            background: #111827; border-bottom: 1px solid #2d1f5e;
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-logo { color: #a78bfa; font-size: 18px; font-weight: bold; letter-spacing: 2px; }
        .header-logo span { color: #34d399; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .admin-email { color: #6b7280; font-size: 12px; }
        .logout-btn {
            padding: 6px 14px; background: #1e293b; color: #94a3b8;
            border: 1px solid #334155; border-radius: 6px;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { background: #334155; color: #e0e8f0; }
        .back-btn {
            padding: 6px 14px; background: #1e3a5f; color: #60a5fa;
            border: 1px solid #1d4ed8; border-radius: 6px;
            font-size: 12px; cursor: pointer; text-decoration: none;
            transition: all 0.2s; display: inline-flex; align-items: center; gap: 4px;
        }
        .back-btn:hover { background: #1d4ed8; }

        .content { padding: 24px; max-width: 1100px; margin: 0 auto; }

        .admin-title {
            display: flex; align-items: center; gap: 12px;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid #2d1f5e;
        }
        .admin-title h2 { color: #c4b5fd; font-size: 22px; letter-spacing: 1px; }
        .admin-title .icon { font-size: 26px; }

        /* ─── 統計カード ─── */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 12px; margin-bottom: 28px;
        }
        .stat-card {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 10px; padding: 16px 20px;
        }
        .stat-card .label { color: #6b7280; font-size: 11px; letter-spacing: 1px; margin-bottom: 6px; }
        .stat-card .value { font-size: 24px; font-weight: bold; color: #e0e8f0; }
        .stat-card .value.purple { color: #a78bfa; }
        .stat-card .value.green { color: #34d399; }
        .stat-card .value.yellow { color: #fbbf24; }
        .stat-card .value.red { color: #f87171; }

        /* ─── セクション ─── */
        .admin-section {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 12px; padding: 20px 24px;
            margin-bottom: 20px;
        }
        .admin-section.warning-zone { border-color: #451a03; }
        .admin-section.danger-zone  { border-color: #7f1d1d; }
        .section-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 16px; padding-bottom: 12px;
        }
        .section-title {
            font-size: 14px; letter-spacing: 1px; font-weight: bold;
            display: flex; align-items: center; gap: 8px;
        }
        .section-title.purple { color: #a78bfa; border-bottom: 2px solid #2d1f5e; }
        .section-title.yellow { color: #fbbf24; }
        .section-title.red    { color: #f87171; }
        .section-title.green  { color: #34d399; }

        /* ─── プレイヤー追加フォーム ─── */
        .add-form {
            display: flex; gap: 10px; align-items: flex-end; flex-wrap: wrap;
            padding: 16px; background: #0f172a;
            border: 1px solid #1e293b; border-radius: 8px;
        }
        .add-form .fg { flex: 1; min-width: 140px; }
        .add-form .fg label { display: block; color: #6b7280; font-size: 11px; margin-bottom: 5px; }
        .add-form .fg input {
            width: 100%; padding: 9px 12px;
            background: #111827; color: #e0e8f0;
            border: 1px solid #1e293b; border-radius: 8px; font-size: 13px;
        }
        .add-form .fg input:focus { outline: none; border-color: #7c3aed; }
        .add-player-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; border: none; border-radius: 8px;
            font-size: 13px; font-weight: bold; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .add-player-btn:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }

        /* ─── プレイヤー一覧 ─── */
        .player-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
        .player-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 8px; transition: all 0.2s;
        }
        .player-row:hover { border-color: #334155; }
        .player-row.warned { border-color: #78350f; background: #1c0f0222; }
        .player-info { flex: 1; }
        .player-email { font-size: 13px; color: #e0e8f0; font-weight: 500; }
        .player-uid { font-size: 10px; color: #374151; margin-top: 1px; }
        .player-balance {
            font-size: 13px; color: #fbbf24; font-weight: bold;
            min-width: 130px; text-align: right;
        }
        .player-actions { display: flex; gap: 6px; }

        .btn {
            padding: 5px 12px; border: none; border-radius: 6px;
            font-size: 11px; font-weight: bold;
            cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
        }
        .btn-warn {
            background: #451a0322; color: #fbbf24; border: 1px solid #78350f;
        }
        .btn-warn:hover { background: #78350f; }
        .btn-up {
            background: #064e3b22; color: #34d399; border: 1px solid #065f46;
        }
        .btn-up:hover { background: #065f46; }
        .btn-down {
            background: #450a0a22; color: #f87171; border: 1px solid #7f1d1d;
        }
        .btn-down:hover { background: #7f1d1d; }
        .btn-set {
            background: #1e3a5f22; color: #60a5fa; border: 1px solid #1d4ed8;
        }
        .btn-set:hover { background: #1d4ed8; }
        .btn-delete {
            background: #1f2937; color: #6b7280; border: 1px solid #374151;
        }
        .btn-delete:hover { background: #7f1d1d22; color: #f87171; border-color: #7f1d1d; }

        .refresh-btn {
            padding: 6px 16px; background: #1e293b; color: #94a3b8;
            border: 1px solid #334155; border-radius: 6px;
            font-size: 11px; cursor: pointer; transition: all 0.2s;
        }
        .refresh-btn:hover { background: #334155; color: #e0e8f0; }

        /* ─── 警告履歴 ─── */
        .warn-log-table {
            width: 100%; border-collapse: collapse;
            background: #111827; border-radius: 10px; overflow: hidden;
            border: 1px solid #1e293b;
        }
        .warn-log-table th {
            background: #0f172a; color: #6b7280;
            font-size: 11px; letter-spacing: 1px;
            padding: 10px 14px; text-align: left;
        }
        .warn-log-table td {
            padding: 10px 14px; border-top: 1px solid #1e293b;
            font-size: 12px;
        }
        .warn-log-table tr:hover td { background: #1e293b22; }
        .empty-state { color: #374151; font-size: 13px; text-align: center; padding: 20px; }

        /* ─── モーダル共通 ─── */
        .overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000a; z-index: 200;
            align-items: center; justify-content: center;
        }
        .overlay.show { display: flex; }

        /* 警告入力モーダル */
        .warn-input-modal {
            background: #1e293b; border: 1px solid #b45309;
            border-radius: 14px; padding: 28px 32px;
            width: 100%; max-width: 440px;
        }
        .warn-input-modal h3 { color: #fbbf24; font-size: 16px; margin-bottom: 6px; }
        .warn-input-modal .target { color: #9ca3af; font-size: 12px; margin-bottom: 16px; }
        .warn-input-modal textarea {
            width: 100%; padding: 12px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #334155; border-radius: 8px;
            font-size: 13px; resize: vertical; min-height: 100px;
            margin-bottom: 12px; font-family: inherit;
        }
        .warn-input-modal textarea:focus { outline: none; border-color: #f59e0b; }
        .warn-presets { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
        .warn-preset {
            padding: 5px 12px; background: #0f172a;
            color: #78350f; border: 1px solid #451a03; border-radius: 6px;
            font-size: 11px; cursor: pointer; transition: all 0.15s;
        }
        .warn-preset:hover { background: #451a03; color: #fbbf24; }
        .modal-btns { display: flex; gap: 10px; }
        .btn-cancel {
            flex: 1; padding: 11px;
            background: #374151; color: #9ca3af;
            border: none; border-radius: 8px; font-size: 14px; cursor: pointer;
        }
        .btn-cancel:hover { background: #4b5563; }
        .btn-send {
            flex: 1; padding: 11px;
            background: #78350f; color: #fbbf24;
            border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .btn-send:hover { background: #92400e; }

        /* お金操作モーダル */
        .money-modal {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 14px; padding: 28px 32px;
            width: 100%; max-width: 380px;
        }
        .money-modal h3 { font-size: 16px; margin-bottom: 14px; }
        .money-modal h3.inc { color: #34d399; }
        .money-modal h3.dec { color: #f87171; }
        .money-modal h3.set { color: #60a5fa; }
        .money-modal .target-info {
            font-size: 12px; color: #9ca3af;
            margin-bottom: 14px; padding: 8px 12px;
            background: #0f172a; border-radius: 6px;
        }
        .money-modal input {
            width: 100%; padding: 12px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #334155; border-radius: 8px;
            font-size: 18px; text-align: center; margin-bottom: 12px;
        }
        .money-modal input:focus { outline: none; border-color: #3b82f6; }
        .presets { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
        .preset-btn {
            flex: 1; min-width: 70px; padding: 6px;
            background: #0f172a; color: #9ca3af;
            border: 1px solid #1e293b; border-radius: 6px;
            font-size: 11px; cursor: pointer; text-align: center; transition: all 0.15s;
        }
        .preset-btn:hover { border-color: #3b82f6; color: #60a5fa; }
        .btn-confirm-inc { flex:1; padding:11px; background:#065f46; color:#34d399; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; }
        .btn-confirm-inc:hover { background:#047857; }
        .btn-confirm-dec { flex:1; padding:11px; background:#7f1d1d; color:#f87171; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; }
        .btn-confirm-dec:hover { background:#991b1b; }
        .btn-confirm-set { flex:1; padding:11px; background:#1d4ed8; color:#93c5fd; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; }
        .btn-confirm-set:hover { background:#2563eb; }

        /* 削除確認 */
        .delete-modal {
            background: #1e293b; border: 2px solid #7f1d1d;
            border-radius: 14px; padding: 28px 32px;
            width: 100%; max-width: 380px; text-align: center;
        }
        .delete-modal h3 { color: #f87171; font-size: 18px; margin-bottom: 12px; }
        .delete-modal p { color: #9ca3af; font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
        .btn-delete-exec { flex:1; padding:11px; background:#7f1d1d; color:#f87171; border:none; border-radius:8px; font-size:14px; font-weight:bold; cursor:pointer; }
        .btn-delete-exec:hover { background:#991b1b; }

        /* 警告表示モーダル（プレイヤー側） */
        .warn-display-modal {
            background: linear-gradient(135deg, #1f0808, #1e0a0a);
            border: 2px solid #dc2626;
            border-radius: 16px; padding: 36px 40px;
            text-align: center;
            box-shadow: 0 0 80px #dc262644;
            max-width: 440px; width: 90%;
            animation: warnPulse 0.3s ease-out;
        }
        @keyframes warnPulse { from {transform:scale(0.85);opacity:0;} to {transform:scale(1);opacity:1;} }
        .warn-display-modal .icon { font-size: 52px; margin-bottom: 14px; }
        .warn-display-modal .title { color: #ef4444; font-size: 22px; font-weight: bold; letter-spacing: 2px; margin-bottom: 10px; }
        .warn-display-modal .sub { color: #fca5a5; font-size: 14px; margin-bottom: 8px; }
        .warn-display-modal .msg {
            color: #fef2f2; font-size: 15px; line-height: 1.7;
            margin-bottom: 22px; padding: 14px;
            background: #450a0a55; border-radius: 8px; border: 1px solid #7f1d1d;
            white-space: pre-wrap; text-align: left;
        }
        .btn-warn-close {
            padding: 12px 40px;
            background: linear-gradient(135deg, #dc2626, #991b1b);
            color: #fff; border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
        }
        .btn-warn-close:hover { background: linear-gradient(135deg, #ef4444, #dc2626); }

        /* トースト */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 10px; padding: 14px 20px;
            color: #e0e8f0; font-size: 13px;
            box-shadow: 0 8px 32px #000a;
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s; z-index: 500; max-width: 360px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 3px solid #34d399; }
        .toast.error   { border-left: 3px solid #f87171; }
        .toast.warn    { border-left: 3px solid #fbbf24; }

        @media (max-width: 640px) {
            .content { padding: 14px; }
            .player-row { flex-wrap: wrap; }
            .player-actions { flex-wrap: wrap; }
            .stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

<!-- ===== 管理者ログイン ===== -->
<div id="admin-login">
    <div class="login-box">
        <h1>⚙️ 管理者パネル</h1>
        <div class="subtitle">ADMIN CONTROL PANEL</div>
        <div class="form-group">
            <label>管理者メールアドレス</label>
            <input type="email" id="login-email" placeholder="admin@mail.com">
        </div>
        <div class="form-group">
            <label>パスワード</label>
            <input type="password" id="login-password" placeholder="パスワード">
        </div>
        <button class="auth-btn" onclick="adminLogin()">管理者ログイン</button>
        <div id="login-error"></div>
    </div>
</div>

<!-- ===== 管理者メイン ===== -->
<div id="admin-main">
    <div class="header">
        <div class="header-logo">⚙️ Admin<span>Panel</span></div>
        <div class="header-right">
            <span class="admin-email" id="admin-email-display"></span>
            <a href="index.html" class="back-btn">← ゲームに戻る</a>
            <button class="logout-btn" onclick="adminLogout()">ログアウト</button>
        </div>
    </div>

    <div class="content">
        <div class="admin-title">
            <span class="icon">🛡️</span>
            <h2>管理者コントロールパネル</h2>
        </div>

        <!-- 統計 -->
        <div class="stats-grid">
            <div class="stat-card"><div class="label">総プレイヤー数</div><div class="value purple" id="stat-total">-</div></div>
            <div class="stat-card"><div class="label">総資金</div><div class="value yellow" id="stat-money">-</div></div>
            <div class="stat-card"><div class="label">平均資金</div><div class="value green" id="stat-avg">-</div></div>
            <div class="stat-card"><div class="label">警告送信数</div><div class="value red" id="stat-warns">-</div></div>
        </div>

        <!-- プレイヤー追加 -->
        <div class="admin-section">
            <div class="section-header">
                <span class="section-title purple">➕ プレイヤー追加</span>
            </div>
            <div class="add-form">
                <div class="fg">
                    <label>メールアドレス</label>
                    <input type="email" id="new-email" placeholder="player@mail.com">
                </div>
                <div class="fg">
                    <label>パスワード</label>
                    <input type="password" id="new-password" placeholder="6文字以上">
                </div>
                <div class="fg" style="max-width:160px;">
                    <label>初期資金（円）</label>
                    <input type="number" id="new-balance" placeholder="10000000" value="10000000">
                </div>
                <button class="add-player-btn" onclick="addPlayer()">＋ 追加</button>
            </div>
        </div>

        <!-- プレイヤー一覧 -->
        <div class="admin-section">
            <div class="section-header">
                <span class="section-title purple">👥 プレイヤー一覧</span>
                <button class="refresh-btn" onclick="loadPlayers()">🔄 更新</button>
            </div>
            <div id="player-list" class="player-list">
                <div class="empty-state">読み込み中...</div>
            </div>
        </div>

        <!-- 警告履歴 -->
        <div class="admin-section warning-zone">
            <div class="section-header">
                <span class="section-title yellow">⚠️ 警告送信履歴</span>
                <button class="refresh-btn" onclick="loadWarnLog()">🔄 更新</button>
            </div>
            <table class="warn-log-table">
                <thead>
                    <tr>
                        <th>送信日時</th>
                        <th>対象プレイヤー</th>
                        <th>メッセージ</th>
                    </tr>
                </thead>
                <tbody id="warn-log-body">
                    <tr><td colspan="3" class="empty-state">警告履歴なし</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- ===== 警告入力モーダル ===== -->
<div class="overlay" id="warn-input-overlay">
    <div class="warn-input-modal">
        <h3>⚠️ 警告メッセージ送信</h3>
        <div class="target" id="warn-input-target">対象：-</div>
        <div class="warn-presets">
            <button class="warn-preset" onclick="setWarnPreset('不正行為が確認されました。直ちに行為を停止してください。')">不正行為</button>
            <button class="warn-preset" onclick="setWarnPreset('迷惑行為により他のプレイヤーへの影響が確認されました。')">迷惑行為</button>
            <button class="warn-preset" onclick="setWarnPreset('ルール違反が検出されました。次の違反でアカウント削除となります。')">ルール違反</button>
            <button class="warn-preset" onclick="setWarnPreset('運営より重要なお知らせがあります。')">お知らせ</button>
        </div>
        <textarea id="warn-message" placeholder="警告メッセージを入力してください..."></textarea>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeOverlay('warn-input-overlay')">キャンセル</button>
            <button class="btn-send" onclick="sendWarning()">⚠️ 警告を送信</button>
        </div>
    </div>
</div>

<!-- ===== お金増加モーダル ===== -->
<div class="overlay" id="money-inc-overlay">
    <div class="money-modal">
        <h3 class="inc">💰 資金を増加</h3>
        <div class="target-info" id="money-inc-target">対象：-</div>
        <input type="number" id="money-inc-amount" placeholder="増加額を入力" min="1">
        <div class="presets">
            <button class="preset-btn" onclick="setMoneyPreset('inc',100000)">10万</button>
            <button class="preset-btn" onclick="setMoneyPreset('inc',500000)">50万</button>
            <button class="preset-btn" onclick="setMoneyPreset('inc',1000000)">100万</button>
            <button class="preset-btn" onclick="setMoneyPreset('inc',5000000)">500万</button>
            <button class="preset-btn" onclick="setMoneyPreset('inc',10000000)">1000万</button>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeOverlay('money-inc-overlay')">キャンセル</button>
            <button class="btn-confirm-inc" onclick="applyMoney('inc')">💰 増加する</button>
        </div>
    </div>
</div>

<!-- ===== お金減少モーダル ===== -->
<div class="overlay" id="money-dec-overlay">
    <div class="money-modal">
        <h3 class="dec">💸 資金を減少</h3>
        <div class="target-info" id="money-dec-target">対象：-</div>
        <input type="number" id="money-dec-amount" placeholder="減少額を入力" min="1">
        <div class="presets">
            <button class="preset-btn" onclick="setMoneyPreset('dec',100000)">10万</button>
            <button class="preset-btn" onclick="setMoneyPreset('dec',500000)">50万</button>
            <button class="preset-btn" onclick="setMoneyPreset('dec',1000000)">100万</button>
            <button class="preset-btn" onclick="setMoneyPreset('dec',5000000)">500万</button>
            <button class="preset-btn" onclick="setMoneyPreset('dec',10000000)">1000万</button>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeOverlay('money-dec-overlay')">キャンセル</button>
            <button class="btn-confirm-dec" onclick="applyMoney('dec')">💸 減少する</button>
        </div>
    </div>
</div>

<!-- ===== 資金セットモーダル ===== -->
<div class="overlay" id="money-set-overlay">
    <div class="money-modal">
        <h3 class="set">🔧 資金を直接設定</h3>
        <div class="target-info" id="money-set-target">対象：-</div>
        <input type="number" id="money-set-amount" placeholder="設定する金額" min="0">
        <div class="presets">
            <button class="preset-btn" onclick="setMoneyPreset('set',0)">0円</button>
            <button class="preset-btn" onclick="setMoneyPreset('set',1000000)">100万</button>
            <button class="preset-btn" onclick="setMoneyPreset('set',10000000)">1000万</button>
            <button class="preset-btn" onclick="setMoneyPreset('set',100000000)">1億</button>
        </div>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeOverlay('money-set-overlay')">キャンセル</button>
            <button class="btn-confirm-set" onclick="applyMoney('set')">🔧 設定する</button>
        </div>
    </div>
</div>

<!-- ===== 削除確認モーダル ===== -->
<div class="overlay" id="delete-overlay">
    <div class="delete-modal">
        <h3>🗑️ プレイヤー削除</h3>
        <p id="delete-target-text">このプレイヤーのデータをすべて削除します。<br>この操作は取り消せません。</p>
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeOverlay('delete-overlay')">キャンセル</button>
            <button class="btn-delete-exec" onclick="executeDelete()">🗑️ 削除する</button>
        </div>
    </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDatabase, ref, set, get, update, remove, push, onValue, off }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

// ─── Firebase 設定（index.html と同じものを使用） ───
// ※ index.html の firebaseConfig をここにコピーしてください
const firebaseConfig = {
    // index.html から firebaseConfig をコピー
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

// 管理者メールアドレス（複数可）
const ADMIN_EMAILS = ['game-manager@example.com'];

let currentAdminUid = null;
let pendingDeleteUid = null;
let pendingWarnUid   = null;
let pendingWarnEmail = null;
let pendingMoneyUid  = null;
let pendingMoneyEmail = null;
let warnLogCount = 0;

// ─── 認証状態監視 ───
onAuthStateChanged(auth, user => {
    if (user && ADMIN_EMAILS.includes(user.email)) {
        currentAdminUid = user.uid;
        document.getElementById('admin-login').style.display = 'none';
        document.getElementById('admin-main').style.display  = 'block';
        document.getElementById('admin-email-display').textContent = user.email;
        loadPlayers();
        loadWarnLog();
        listenForWarnAck();
    } else if (user) {
        // 管理者権限なし
        showToast('管理者権限がありません', 'error');
        signOut(auth);
    } else {
        document.getElementById('admin-login').style.display = 'flex';
        document.getElementById('admin-main').style.display  = 'none';
        currentAdminUid = null;
    }
});

// ─── ログイン ───
window.adminLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const pass  = document.getElementById('login-password').value;
    document.getElementById('login-error').textContent = '';
    if (!email || !pass) { document.getElementById('login-error').textContent = 'メールとパスワードを入力してください'; return; }
    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch(e) {
        document.getElementById('login-error').textContent = 'ログインに失敗しました: ' + e.message;
    }
};

// ─── ログアウト ───
window.adminLogout = async () => { await signOut(auth); };

// ─── プレイヤー一覧取得 ───
window.loadPlayers = async () => {
    const listEl = document.getElementById('player-list');
    listEl.innerHTML = '<div class="empty-state">読み込み中...</div>';
    try {
        const snap = await get(ref(db, 'users'));
        if (!snap.exists()) { listEl.innerHTML = '<div class="empty-state">プレイヤーなし</div>'; updateStats([], 0); return; }
        const users = snap.val();
        const uids  = Object.keys(users);
        if (uids.length === 0) { listEl.innerHTML = '<div class="empty-state">プレイヤーなし</div>'; updateStats([], 0); return; }

        // 警告数取得
        const warnSnap = await get(ref(db, 'warnings'));
        const warns = warnSnap.exists() ? warnSnap.val() : {};
        warnLogCount = Object.keys(warns).length;

        listEl.innerHTML = '';
        const balances = [];

        // UID→email は users/{uid}/email に保存されていると仮定
        uids.forEach(uid => {
            const u = users[uid];
            const email   = u.email || uid;
            const balance = u.balance ?? 0;
            balances.push(balance);
            const hasWarn = u.hasWarning ? true : false;

            const row = document.createElement('div');
            row.className = 'player-row' + (hasWarn ? ' warned' : '');
            row.id = 'player-row-' + uid;
            row.innerHTML = `
                <div class="player-info">
                    <div class="player-email">${escHtml(email)}</div>
                    <div class="player-uid">${uid}</div>
                </div>
                <div class="player-balance">¥${balance.toLocaleString()}</div>
                <div class="player-actions">
                    <button class="btn btn-warn"  onclick="openWarnInput('${uid}','${escHtml(email)}')">⚠️ 警告</button>
                    <button class="btn btn-up"    onclick="openMoneyModal('inc','${uid}','${escHtml(email)}')">💰 増加</button>
                    <button class="btn btn-down"  onclick="openMoneyModal('dec','${uid}','${escHtml(email)}')">💸 減少</button>
                    <button class="btn btn-set"   onclick="openMoneyModal('set','${uid}','${escHtml(email)}')">🔧 設定</button>
                    <button class="btn btn-delete" onclick="openDeleteConfirm('${uid}','${escHtml(email)}')">🗑️ 削除</button>
                </div>`;
            listEl.appendChild(row);
        });
        updateStats(balances, warnLogCount);
    } catch(e) {
        listEl.innerHTML = '<div class="empty-state">エラー: ' + e.message + '</div>';
    }
};

// ─── 統計更新 ───
function updateStats(balances, warnCount) {
    document.getElementById('stat-total').textContent = balances.length;
    const total = balances.reduce((a,b) => a+b, 0);
    const avg   = balances.length ? Math.round(total / balances.length) : 0;
    document.getElementById('stat-money').textContent = '¥' + total.toLocaleString();
    document.getElementById('stat-avg').textContent   = '¥' + avg.toLocaleString();
    document.getElementById('stat-warns').textContent  = warnCount;
}

// ─── プレイヤー追加 ───
window.addPlayer = async () => {
    const email   = document.getElementById('new-email').value.trim();
    const pass    = document.getElementById('new-password').value;
    const balance = parseInt(document.getElementById('new-balance').value) || 10000000;
    if (!email || !pass) { showToast('メールとパスワードを入力してください', 'error'); return; }
    if (pass.length < 6) { showToast('パスワードは6文字以上にしてください', 'error'); return; }
    try {
        // 二次 App で作成してサインアウトしないようにする方法
        // ここでは Firebase Admin SDK がないため、別アプリインスタンスで作成
        const { initializeApp: initApp2 } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
        const { getAuth: getAuth2, createUserWithEmailAndPassword: create2 } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js');
        const app2  = initApp2(app.options, 'secondaryApp_' + Date.now());
        const auth2 = getAuth2(app2);
        const cred  = await create2(auth2, email, pass);
        const uid   = cred.user.uid;
        await signOut(auth2);
        // DB に保存
        await set(ref(db, `users/${uid}`), {
            email, balance, createdAt: Date.now(), holdings: {}, tradeHistory: []
        });
        document.getElementById('new-email').value    = '';
        document.getElementById('new-password').value = '';
        showToast(`${email} を追加しました`, 'success');
        loadPlayers();
    } catch(e) {
        showToast('追加失敗: ' + e.message, 'error');
    }
};

// ─── 削除 ───
window.openDeleteConfirm = (uid, email) => {
    pendingDeleteUid = uid;
    document.getElementById('delete-target-text').innerHTML =
        `<strong style="color:#f87171">${escHtml(email)}</strong> のすべてのデータを削除します。<br>この操作は取り消せません。`;
    openOverlay('delete-overlay');
};
window.executeDelete = async () => {
    if (!pendingDeleteUid) return;
    try {
        await remove(ref(db, `users/${pendingDeleteUid}`));
        // 警告もあれば削除
        const wSnap = await get(ref(db, 'warnings'));
        if (wSnap.exists()) {
            const warns = wSnap.val();
            for (const [key, val] of Object.entries(warns)) {
                if (val.uid === pendingDeleteUid) await remove(ref(db, `warnings/${key}`));
            }
        }
        closeOverlay('delete-overlay');
        showToast('プレイヤーを削除しました', 'success');
        loadPlayers();
        loadWarnLog();
    } catch(e) {
        showToast('削除失敗: ' + e.message, 'error');
    }
};

// ─── 警告 ───
window.openWarnInput = (uid, email) => {
    pendingWarnUid   = uid;
    pendingWarnEmail = email;
    document.getElementById('warn-input-target').textContent = '対象: ' + email;
    document.getElementById('warn-message').value = '';
    openOverlay('warn-input-overlay');
};
window.setWarnPreset = txt => { document.getElementById('warn-message').value = txt; };
window.sendWarning = async () => {
    const msg = document.getElementById('warn-message').value.trim();
    if (!msg) { showToast('メッセージを入力してください', 'error'); return; }
    try {
        const warnKey = push(ref(db, 'warnings')).key;
        await set(ref(db, `warnings/${warnKey}`), {
            uid: pendingWarnUid,
            email: pendingWarnEmail,
            message: msg,
            sentAt: Date.now(),
            acked: false
        });
        // ユーザーの hasWarning フラグを立てる
        await update(ref(db, `users/${pendingWarnUid}`), { hasWarning: true, warningMessage: msg });
        closeOverlay('warn-input-overlay');
        showToast(`${pendingWarnEmail} に警告を送信しました`, 'warn');
        loadPlayers();
        loadWarnLog();
    } catch(e) {
        showToast('警告送信失敗: ' + e.message, 'error');
    }
};

// ─── 警告ログ ───
window.loadWarnLog = async () => {
    const tbody = document.getElementById('warn-log-body');
    try {
        const snap = await get(ref(db, 'warnings'));
        if (!snap.exists()) { tbody.innerHTML = '<tr><td colspan="3" class="empty-state">警告履歴なし</td></tr>'; return; }
        const warns = snap.val();
        const rows  = Object.values(warns).sort((a,b) => b.sentAt - a.sentAt);
        tbody.innerHTML = rows.map(w => `
            <tr>
                <td>${new Date(w.sentAt).toLocaleString('ja-JP')}</td>
                <td>${escHtml(w.email || '-')}</td>
                <td>${escHtml(w.message)}</td>
            </tr>`).join('');
    } catch(e) {
        tbody.innerHTML = '<tr><td colspan="3" class="empty-state">エラー</td></tr>';
    }
};

// ─── 警告確認リスナー（index.html 側が acked したら hasWarning 解除） ───
function listenForWarnAck() {
    // 1分ごとに確認済み警告をクリーンアップ
    setInterval(async () => {
        const snap = await get(ref(db, 'warnings'));
        if (!snap.exists()) return;
        const warns = snap.val();
        for (const [key, val] of Object.entries(warns)) {
            if (val.acked) {
                await update(ref(db, `users/${val.uid}`), { hasWarning: false, warningMessage: null });
            }
        }
    }, 60000);
}

// ─── お金操作 ───
window.openMoneyModal = (type, uid, email) => {
    pendingMoneyUid   = uid;
    pendingMoneyEmail = email;
    if (type === 'inc') {
        document.getElementById('money-inc-target').textContent = '対象: ' + email;
        document.getElementById('money-inc-amount').value = '';
        openOverlay('money-inc-overlay');
    } else if (type === 'dec') {
        document.getElementById('money-dec-target').textContent = '対象: ' + email;
        document.getElementById('money-dec-amount').value = '';
        openOverlay('money-dec-overlay');
    } else {
        document.getElementById('money-set-target').textContent = '対象: ' + email;
        document.getElementById('money-set-amount').value = '';
        openOverlay('money-set-overlay');
    }
};
window.setMoneyPreset = (type, val) => {
    if (type === 'inc') document.getElementById('money-inc-amount').value = val;
    else if (type === 'dec') document.getElementById('money-dec-amount').value = val;
    else document.getElementById('money-set-amount').value = val;
};
window.applyMoney = async (type) => {
    let amount;
    if (type === 'inc')      amount = parseInt(document.getElementById('money-inc-amount').value);
    else if (type === 'dec') amount = parseInt(document.getElementById('money-dec-amount').value);
    else                     amount = parseInt(document.getElementById('money-set-amount').value);

    if (isNaN(amount) || amount < 0) { showToast('有効な金額を入力してください', 'error'); return; }
    try {
        const snap = await get(ref(db, `users/${pendingMoneyUid}/balance`));
        const current = snap.exists() ? snap.val() : 0;
        let newBal;
        if      (type === 'inc') newBal = current + amount;
        else if (type === 'dec') newBal = Math.max(0, current - amount);
        else                     newBal = amount;
        await update(ref(db, `users/${pendingMoneyUid}`), { balance: newBal });
        closeOverlay('money-inc-overlay');
        closeOverlay('money-dec-overlay');
        closeOverlay('money-set-overlay');
        const label = type === 'inc' ? '増加' : type === 'dec' ? '減少' : '設定';
        showToast(`${pendingMoneyEmail} の資金を${label}しました（¥${newBal.toLocaleString()}）`, 'success');
        loadPlayers();
    } catch(e) {
        showToast('操作失敗: ' + e.message, 'error');
    }
};

// ─── ユーティリティ ───
window.openOverlay  = id => document.getElementById(id).classList.add('show');
window.closeOverlay = id => document.getElementById(id).classList.remove('show');

function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
}
</script>

</body>
</html>
