<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理者パネル - 株取引シミュレーター</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0e17;
            color: #e0e8f0;
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            min-height: 100vh;
        }

        /* ─── ログイン画面 ─── */
        #login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0f1829 0%, #0a0e17 70%);
        }
        .login-box {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px #0008;
        }
        .login-box h1 {
            text-align: center; color: #f87171;
            font-size: 22px; letter-spacing: 2px; margin-bottom: 6px;
        }
        .login-box .subtitle {
            text-align: center; color: #4b5563;
            font-size: 12px; margin-bottom: 28px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; color: #6b7280;
            font-size: 11px; letter-spacing: 1px; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 10px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #1e293b; border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; }
        .auth-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #fff; border: none; border-radius: 8px;
            font-size: 15px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; margin-top: 8px; transition: all 0.2s;
        }
        .auth-btn:hover { background: linear-gradient(135deg, #ef4444, #dc2626); }
        #auth-error {
            color: #f87171; font-size: 12px;
            text-align: center; margin-top: 10px; min-height: 18px;
        }
        .back-link {
            display: block; text-align: center; margin-top: 16px;
            color: #6b7280; font-size: 13px;
        }
        .back-link a { color: #60a5fa; text-decoration: underline; }

        /* ─── アクセス拒否 ─── */
        #access-denied {
            display: none; min-height: 100vh;
            align-items: center; justify-content: center;
            background: radial-gradient(ellipse at center, #0f1829 0%, #0a0e17 70%);
        }
        .denied-box {
            background: #111827; border: 2px solid #dc2626;
            border-radius: 16px; padding: 40px; text-align: center;
            max-width: 400px; width: 100%;
        }
        .denied-box .icon { font-size: 48px; margin-bottom: 12px; }
        .denied-box h2 { color: #f87171; margin-bottom: 8px; }
        .denied-box p { color: #6b7280; font-size: 13px; margin-bottom: 20px; line-height: 1.6; }
        .denied-box button {
            padding: 10px 24px; background: #1e293b; color: #94a3b8;
            border: 1px solid #334155; border-radius: 8px;
            cursor: pointer; font-size: 13px;
        }
        .denied-box button:hover { background: #334155; }

        /* ─── メイン画面 ─── */
        #admin-screen { display: none; }

        .header {
            background: #111827;
            border-bottom: 1px solid #1e293b;
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo {
            color: #f87171; font-size: 18px;
            font-weight: bold; letter-spacing: 2px;
        }
        .header-logo span { color: #fbbf24; }
        .admin-badge {
            background: #7f1d1d; color: #fca5a5;
            font-size: 10px; padding: 3px 10px;
            border-radius: 4px; font-weight: bold;
            letter-spacing: 1px;
        }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .user-email { color: #6b7280; font-size: 12px; }
        .logout-btn {
            padding: 6px 14px; background: #1e293b; color: #94a3b8;
            border: 1px solid #334155; border-radius: 6px;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { background: #334155; color: #e0e8f0; }

        /* タブナビ */
        .tab-nav {
            display: flex; background: #111827;
            border-bottom: 1px solid #1e293b;
            padding: 0 24px;
        }
        .tab-btn {
            padding: 12px 24px; background: none; border: none;
            color: #6b7280; font-size: 13px; cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s; letter-spacing: 1px;
        }
        .tab-btn:hover { color: #94a3b8; }
        .tab-btn.active { color: #f87171; border-bottom-color: #dc2626; }

        .content { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* ─── セクション共通 ─── */
        .section-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 16px;
        }
        .section-header h2 { color: #e0e8f0; font-size: 18px; letter-spacing: 1px; }
        .section-header .count {
            background: #1e293b; color: #6b7280;
            font-size: 12px; padding: 4px 12px;
            border-radius: 6px;
        }

        /* ─── テーブル共通 ─── */
        .data-table {
            width: 100%; border-collapse: collapse;
            background: #111827; border-radius: 10px; overflow: hidden;
            border: 1px solid #1e293b;
        }
        .data-table th {
            background: #0f172a; color: #6b7280;
            font-size: 11px; letter-spacing: 1px;
            padding: 12px 16px; text-align: left;
        }
        .data-table td {
            padding: 12px 16px; border-top: 1px solid #1e293b;
            font-size: 13px;
        }
        .data-table tr:hover td { background: #1e293b22; }
        .data-table .empty-row td {
            text-align: center; color: #6b7280; padding: 32px;
        }

        .delete-btn {
            padding: 6px 14px; background: #450a0a; color: #f87171;
            border: 1px solid #7f1d1d; border-radius: 6px;
            font-size: 11px; cursor: pointer; transition: all 0.15s;
            font-weight: bold; letter-spacing: 0.5px;
        }
        .delete-btn:hover { background: #7f1d1d; }

        .warn-btn {
            padding: 6px 14px; background: #78350f; color: #fbbf24;
            border: 1px solid #92400e; border-radius: 6px;
            font-size: 11px; cursor: pointer; transition: all 0.15s;
            font-weight: bold; letter-spacing: 0.5px;
        }
        .warn-btn:hover { background: #92400e; }

        /* ─── 警告送信フォーム ─── */
        .warning-form {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 12px; padding: 24px 28px;
            margin-bottom: 20px;
        }
        .warning-form h3 {
            color: #fbbf24; font-size: 16px;
            margin-bottom: 16px; letter-spacing: 1px;
        }
        .warning-form .form-group { margin-bottom: 14px; }
        .warning-form .form-group label {
            display: block; color: #9ca3af;
            font-size: 12px; margin-bottom: 6px;
        }
        .warning-form select,
        .warning-form textarea {
            width: 100%; padding: 10px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #1e293b; border-radius: 8px;
            font-size: 14px; font-family: inherit;
        }
        .warning-form select:focus,
        .warning-form textarea:focus { outline: none; border-color: #f59e0b; }
        .warning-form textarea { height: 100px; resize: vertical; }
        .send-warning-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #d97706, #b45309);
            color: #fff; border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; transition: all 0.2s;
        }
        .send-warning-btn:hover { background: linear-gradient(135deg, #f59e0b, #d97706); }

        /* 警告履歴 */
        .warning-type-badge {
            font-size: 10px; padding: 2px 8px;
            border-radius: 4px; font-weight: bold;
        }
        .warning-type-badge.active {
            background: #7f1d1d; color: #fca5a5;
        }
        .warning-type-badge.acknowledged {
            background: #1e3a5f; color: #60a5fa;
        }

        /* ─── 確認モーダル ─── */
        .confirm-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000a; z-index: 200;
            align-items: center; justify-content: center;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-modal {
            background: #1e293b; border: 1px solid #334155;
            border-radius: 14px; padding: 28px 32px;
            width: 100%; max-width: 420px;
            box-shadow: 0 12px 48px #000a;
            text-align: center;
        }
        .confirm-modal .icon { font-size: 36px; margin-bottom: 12px; }
        .confirm-modal h3 { color: #e0e8f0; margin-bottom: 8px; font-size: 16px; }
        .confirm-modal p { color: #9ca3af; font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
        .confirm-modal .target-name {
            color: #fbbf24; font-weight: bold;
        }
        .confirm-btns { display: flex; gap: 10px; }
        .confirm-cancel {
            flex: 1; padding: 12px;
            background: #374151; color: #9ca3af;
            border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer;
        }
        .confirm-cancel:hover { background: #4b5563; }
        .confirm-delete {
            flex: 1; padding: 12px;
            background: #dc2626; color: #fff;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            letter-spacing: 1px;
        }
        .confirm-delete:hover { background: #ef4444; }

        /* ─── トースト ─── */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 10px; padding: 14px 20px;
            color: #e0e8f0; font-size: 13px;
            box-shadow: 0 8px 32px #000a;
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s; z-index: 300;
            max-width: 360px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 3px solid #34d399; }
        .toast.error { border-left: 3px solid #f87171; }

        /* ─── レスポンシブ ─── */
        @media (max-width: 640px) {
            .header { padding: 10px 14px; flex-wrap: wrap; gap: 8px; }
            .content { padding: 14px; }
            .tab-btn { padding: 10px 14px; font-size: 12px; }
            .data-table { font-size: 12px; }
            .data-table th, .data-table td { padding: 8px 10px; }
        }
    </style>
</head>
<body>

<!-- ===== ログイン画面 ===== -->
<div id="login-screen">
    <div class="login-box">
        <h1>🔒 管理者パネル</h1>
        <div class="subtitle">ADMIN PANEL - STOCK TRADING SIMULATOR</div>
        <div class="form-group">
            <label>メールアドレス</label>
            <input type="email" id="auth-email" placeholder="admin@example.com">
        </div>
        <div class="form-group">
            <label>パスワード</label>
            <input type="password" id="auth-password" placeholder="6文字以上">
        </div>
        <button class="auth-btn" onclick="handleLogin()">ログイン</button>
        <div id="auth-error"></div>
        <div class="back-link"><a href="index.html">← 株取引シミュレーターに戻る</a></div>
    </div>
</div>

<!-- ===== アクセス拒否画面 ===== -->
<div id="access-denied">
    <div class="denied-box">
        <div class="icon">🚫</div>
        <h2>アクセス拒否</h2>
        <p>管理者権限がありません。<br>管理者に連絡してください。</p>
        <p style="color:#4b5563;font-size:11px;margin-bottom:16px;" id="denied-uid"></p>
        <button onclick="handleLogout()">ログアウト</button>
    </div>
</div>

<!-- ===== メイン管理画面 ===== -->
<div id="admin-screen">
    <div class="header">
        <div class="header-left">
            <div class="header-logo">🔒 Admin<span>Panel</span></div>
            <span class="admin-badge">ADMIN</span>
        </div>
        <div class="header-right">
            <span class="user-email" id="user-email"></span>
            <button class="logout-btn" onclick="handleLogout()">ログアウト</button>
        </div>
    </div>

    <div class="tab-nav">
        <button class="tab-btn active" data-tab="companies" onclick="switchTab('companies')">会社管理</button>
        <button class="tab-btn" data-tab="players" onclick="switchTab('players')">プレイヤー管理</button>
        <button class="tab-btn" data-tab="warnings" onclick="switchTab('warnings')">警告管理</button>
    </div>

    <div class="content">
        <!-- 会社管理タブ -->
        <div class="tab-content active" id="tab-companies">
            <div class="section-header">
                <h2>🏢 会社管理</h2>
                <span class="count" id="company-count">0 件</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>会社名</th>
                        <th>ティッカー</th>
                        <th>初期株価</th>
                        <th>作成者</th>
                        <th>作成日</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="companies-body">
                    <tr class="empty-row"><td colspan="6">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- プレイヤー管理タブ -->
        <div class="tab-content" id="tab-players">
            <div class="section-header">
                <h2>👥 プレイヤー管理</h2>
                <span class="count" id="player-count">0 人</span>
            </div>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>UID</th>
                        <th>残高</th>
                        <th>保有銘柄数</th>
                        <th>会社</th>
                        <th>警告</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="players-body">
                    <tr class="empty-row"><td colspan="6">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>

        <!-- 警告管理タブ -->
        <div class="tab-content" id="tab-warnings">
            <div class="section-header">
                <h2>⚠️ 警告管理</h2>
            </div>
            <div class="warning-form">
                <h3>⚠️ 警告を送信</h3>
                <div class="form-group">
                    <label>対象プレイヤー</label>
                    <select id="warning-target">
                        <option value="">-- プレイヤーを選択 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>警告メッセージ</label>
                    <textarea id="warning-message" placeholder="迷惑行為の内容と警告理由を入力してください..."></textarea>
                </div>
                <button class="send-warning-btn" onclick="sendWarning()">警告を送信する</button>
            </div>

            <h3 style="color:#e0e8f0;font-size:16px;margin-bottom:12px;">警告履歴</h3>
            <table class="data-table">
                <thead>
                    <tr>
                        <th>日時</th>
                        <th>対象</th>
                        <th>メッセージ</th>
                        <th>状態</th>
                    </tr>
                </thead>
                <tbody id="warnings-body">
                    <tr class="empty-row"><td colspan="4">読み込み中...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 確認モーダル -->
<div class="confirm-overlay" id="confirm-modal">
    <div class="confirm-modal">
        <div class="icon" id="confirm-icon">⚠️</div>
        <h3 id="confirm-title">確認</h3>
        <p id="confirm-message"></p>
        <div class="confirm-btns">
            <button class="confirm-cancel" onclick="closeConfirm()">キャンセル</button>
            <button class="confirm-delete" id="confirm-action" onclick="executeConfirm()">削除</button>
        </div>
    </div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<!-- ===== Firebase + ロジック ===== -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import {
    getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import {
    getDatabase, ref as dbRef, set, get, remove, onValue
} from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const firebaseConfig = {
    apiKey:            "AIzaSyDnwj8QlE_KuvfqFwkUr80DLGvysP_XB94",
    authDomain:        "stock-sim-aa632.firebaseapp.com",
    databaseURL:       "https://stock-sim-aa632-default-rtdb.firebaseio.com",
    projectId:         "stock-sim-aa632",
    storageBucket:     "stock-sim-aa632.firebasestorage.app",
    messagingSenderId: "737948010065",
    appId:             "1:737948010065:web:2329b0a1b4dd3f9659da70",
    measurementId:     "G-PW89SVWW0X"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

let currentUser = null;
let confirmCallback = null;
let playersCache = {};

/* ─── 認証 ─── */
window.handleLogin = async function() {
    const email = document.getElementById('auth-email').value.trim();
    const pass  = document.getElementById('auth-password').value;
    const errEl = document.getElementById('auth-error');
    errEl.textContent = '';

    if (!email || !pass) { errEl.textContent = 'メールとパスワードを入力してください'; return; }

    try {
        await signInWithEmailAndPassword(auth, email, pass);
    } catch (e) {
        const msgs = {
            'auth/user-not-found':    'ユーザーが見つかりません',
            'auth/wrong-password':     'パスワードが正しくありません',
            'auth/invalid-credential': 'メールまたはパスワードが正しくありません',
            'auth/invalid-email':      'メールアドレスの形式が正しくありません',
        };
        errEl.textContent = msgs[e.code] || e.message;
    }
};

window.handleLogout = async function() {
    await signOut(auth);
    window.location.reload();
};

onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        document.getElementById('login-screen').style.display = 'none';

        const isAdmin = await checkAdmin(user.uid);
        if (isAdmin) {
            document.getElementById('admin-screen').style.display = 'block';
            document.getElementById('user-email').textContent = user.email;
            loadCompanies();
            loadPlayers();
            loadWarnings();
        } else {
            document.getElementById('access-denied').style.display = 'flex';
            document.getElementById('denied-uid').textContent = `UID: ${user.uid}`;
        }
    } else {
        currentUser = null;
        document.getElementById('login-screen').style.display = '';
        document.getElementById('admin-screen').style.display = 'none';
        document.getElementById('access-denied').style.display = 'none';
    }
});

async function checkAdmin(uid) {
    try {
        const snap = await get(dbRef(db, `admins/${uid}`));
        return snap.exists();
    } catch (e) {
        console.warn('Admin check failed:', e.message);
        return false;
    }
}

/* ─── 会社管理 ─── */
async function loadCompanies() {
    const body = document.getElementById('companies-body');
    try {
        const snap = await get(dbRef(db, 'companies'));
        if (!snap.exists()) {
            body.innerHTML = '<tr class="empty-row"><td colspan="6">会社データがありません</td></tr>';
            document.getElementById('company-count').textContent = '0 件';
            return;
        }
        const companies = snap.val();
        const entries = Object.entries(companies);
        document.getElementById('company-count').textContent = `${entries.length} 件`;

        body.innerHTML = entries.map(([id, c]) => {
            const date = c.createdAt ? new Date(c.createdAt).toLocaleDateString('ja-JP') : '不明';
            return `
                <tr>
                    <td><strong>${escHtml(c.name)}</strong></td>
                    <td>${escHtml(c.ticker)}</td>
                    <td>¥${(c.initialPrice || 0).toLocaleString()}</td>
                    <td style="font-size:11px;color:#9ca3af;">${escHtml(c.ownerEmail || '不明')}</td>
                    <td>${date}</td>
                    <td><button class="delete-btn" onclick="confirmDeleteCompany('${escAttr(id)}', '${escAttr(c.name)}')">削除</button></td>
                </tr>
            `;
        }).join('');
    } catch (e) {
        body.innerHTML = `<tr class="empty-row"><td colspan="6">読み込みエラー: ${escHtml(e.message)}</td></tr>`;
    }
}

window.confirmDeleteCompany = function(id, name) {
    openConfirm(
        '🏢',
        '会社を削除しますか？',
        `<span class="target-name">${escHtml(name)}</span> をマーケットから完全に削除します。<br>この操作は取り消せません。`,
        async () => {
            try {
                await remove(dbRef(db, `companies/${id}`));
                showToast(`${name} を削除しました`, 'success');
                loadCompanies();
            } catch (e) {
                showToast(`削除に失敗しました: ${e.message}`, 'error');
            }
        }
    );
};

/* ─── プレイヤー管理 ─── */
async function loadPlayers() {
    const body = document.getElementById('players-body');
    const select = document.getElementById('warning-target');
    try {
        const snap = await get(dbRef(db, 'stock_users'));
        if (!snap.exists()) {
            body.innerHTML = '<tr class="empty-row"><td colspan="6">プレイヤーデータがありません</td></tr>';
            document.getElementById('player-count').textContent = '0 人';
            return;
        }
        const players = snap.val();
        playersCache = players;
        const entries = Object.entries(players);
        document.getElementById('player-count').textContent = `${entries.length} 人`;

        /* 警告数を取得 */
        let warningCounts = {};
        try {
            const wSnap = await get(dbRef(db, 'warnings'));
            if (wSnap.exists()) {
                Object.entries(wSnap.val()).forEach(([uid, warnings]) => {
                    const activeCount = Object.values(warnings).filter(w => !w.acknowledged).length;
                    if (activeCount > 0) warningCounts[uid] = activeCount;
                });
            }
        } catch { /* ignore */ }

        body.innerHTML = entries.map(([uid, data]) => {
            const holdingCount = data.holdings ? Object.keys(data.holdings).filter(k => data.holdings[k]?.qty > 0).length : 0;
            const companyName = data.company ? data.company.name : '—';
            const warnCount = warningCounts[uid] || 0;
            const warnBadge = warnCount > 0
                ? `<span class="warning-type-badge active">${warnCount}件</span>`
                : '<span style="color:#6b7280;">なし</span>';
            return `
                <tr>
                    <td style="font-size:11px;font-family:monospace;color:#9ca3af;" title="${escAttr(uid)}">${uid.substring(0, 12)}...</td>
                    <td>¥${(data.balance || 0).toLocaleString()}</td>
                    <td>${holdingCount}</td>
                    <td>${escHtml(companyName)}</td>
                    <td>${warnBadge}</td>
                    <td>
                        <button class="warn-btn" onclick="quickWarn('${escAttr(uid)}')">警告</button>
                        <button class="delete-btn" onclick="confirmDeletePlayer('${escAttr(uid)}')">削除</button>
                    </td>
                </tr>
            `;
        }).join('');

        /* 警告送信フォームのセレクトを更新 */
        select.innerHTML = '<option value="">-- プレイヤーを選択 --</option>';
        entries.forEach(([uid]) => {
            const opt = document.createElement('option');
            opt.value = uid;
            opt.textContent = uid.substring(0, 20) + '...';
            select.appendChild(opt);
        });
    } catch (e) {
        body.innerHTML = `<tr class="empty-row"><td colspan="6">読み込みエラー: ${escHtml(e.message)}</td></tr>`;
    }
}

window.confirmDeletePlayer = function(uid) {
    openConfirm(
        '👤',
        'プレイヤーを削除しますか？',
        `UID: <span class="target-name">${escHtml(uid.substring(0, 20))}...</span><br>全データ（残高・保有株・取引履歴・会社）が完全に削除されます。<br>この操作は取り消せません。`,
        async () => {
            try {
                /* プレイヤーの会社がcompaniesにあれば一緒に削除 */
                const playerData = playersCache[uid];
                if (playerData?.company?.id) {
                    await remove(dbRef(db, `companies/${playerData.company.id}`));
                }
                await remove(dbRef(db, `stock_users/${uid}`));
                await remove(dbRef(db, `warnings/${uid}`));
                showToast('プレイヤーを削除しました', 'success');
                loadCompanies();
                loadPlayers();
                loadWarnings();
            } catch (e) {
                showToast(`削除に失敗しました: ${e.message}`, 'error');
            }
        }
    );
};

/* ─── 警告管理 ─── */
window.quickWarn = function(uid) {
    switchTab('warnings');
    document.getElementById('warning-target').value = uid;
    document.getElementById('warning-message').focus();
};

window.sendWarning = async function() {
    const uid = document.getElementById('warning-target').value;
    const message = document.getElementById('warning-message').value.trim();

    if (!uid) { showToast('対象プレイヤーを選択してください', 'error'); return; }
    if (!message) { showToast('警告メッセージを入力してください', 'error'); return; }

    try {
        const warningId = `warn_${Date.now()}`;
        await set(dbRef(db, `warnings/${uid}/${warningId}`), {
            message: message,
            timestamp: Date.now(),
            acknowledged: false,
            issuedBy: currentUser.email,
        });
        showToast('警告を送信しました', 'success');
        document.getElementById('warning-message').value = '';
        document.getElementById('warning-target').value = '';
        loadWarnings();
        loadPlayers();
    } catch (e) {
        showToast(`警告の送信に失敗しました: ${e.message}`, 'error');
    }
};

async function loadWarnings() {
    const body = document.getElementById('warnings-body');
    try {
        const snap = await get(dbRef(db, 'warnings'));
        if (!snap.exists()) {
            body.innerHTML = '<tr class="empty-row"><td colspan="4">警告履歴はありません</td></tr>';
            return;
        }
        const allWarnings = [];
        Object.entries(snap.val()).forEach(([uid, warnings]) => {
            Object.entries(warnings).forEach(([wid, w]) => {
                allWarnings.push({ uid, wid, ...w });
            });
        });

        allWarnings.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

        if (allWarnings.length === 0) {
            body.innerHTML = '<tr class="empty-row"><td colspan="4">警告履歴はありません</td></tr>';
            return;
        }

        body.innerHTML = allWarnings.map(w => {
            const date = w.timestamp ? new Date(w.timestamp).toLocaleString('ja-JP') : '不明';
            const statusBadge = w.acknowledged
                ? '<span class="warning-type-badge acknowledged">確認済み</span>'
                : '<span class="warning-type-badge active">未確認</span>';
            return `
                <tr>
                    <td style="font-size:12px;">${date}</td>
                    <td style="font-size:11px;font-family:monospace;color:#9ca3af;" title="${escAttr(w.uid)}">${w.uid.substring(0, 12)}...</td>
                    <td style="max-width:300px;word-break:break-word;">${escHtml(w.message)}</td>
                    <td>${statusBadge}</td>
                </tr>
            `;
        }).join('');
    } catch (e) {
        body.innerHTML = `<tr class="empty-row"><td colspan="4">読み込みエラー: ${escHtml(e.message)}</td></tr>`;
    }
}

/* ─── 確認モーダル ─── */
function openConfirm(icon, title, message, callback) {
    document.getElementById('confirm-icon').textContent = icon;
    document.getElementById('confirm-title').textContent = title;
    document.getElementById('confirm-message').innerHTML = message;
    confirmCallback = callback;
    document.getElementById('confirm-modal').classList.add('show');
}

window.closeConfirm = function() {
    document.getElementById('confirm-modal').classList.remove('show');
    confirmCallback = null;
};

window.executeConfirm = async function() {
    if (confirmCallback) {
        await confirmCallback();
    }
    closeConfirm();
};

/* ─── タブ切替 ─── */
window.switchTab = function(tab) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.tab-btn[data-tab="${tab}"]`).classList.add('active');
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.getElementById(`tab-${tab}`).classList.add('active');
};

/* ─── ユーティリティ ─── */
function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
}

function escHtml(str) {
    const div = document.createElement('div');
    div.textContent = str || '';
    return div.innerHTML;
}

function escAttr(str) {
    return (str || '').replace(/'/g, "\\'").replace(/"/g, '&quot;');
}
</script>
</body>
