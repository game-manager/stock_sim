<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>株取引シミュレーター</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0e17;
            color: #e0e8f0;
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            min-height: 100vh;
        }
 
        /* ─── ログイン画面 ─── */
        #login-screen {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh;
            background: radial-gradient(ellipse at center, #0f1829 0%, #0a0e17 70%);
        }
        .login-box {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%; max-width: 400px;
            box-shadow: 0 8px 32px #0008;
        }
        .login-box h1 {
            text-align: center; color: #60a5fa;
            font-size: 22px; letter-spacing: 2px; margin-bottom: 6px;
        }
        .login-box .subtitle {
            text-align: center; color: #4b5563;
            font-size: 12px; margin-bottom: 28px;
        }
        .form-group { margin-bottom: 16px; }
        .form-group label {
            display: block; color: #6b7280;
            font-size: 11px; letter-spacing: 1px; margin-bottom: 6px;
        }
        .form-group input {
            width: 100%; padding: 10px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #1e293b; border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus { outline: none; border-color: #3b82f6; }
        .auth-btn {
            width: 100%; padding: 12px;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #fff; border: none; border-radius: 8px;
            font-size: 15px; font-weight: bold; letter-spacing: 2px;
            cursor: pointer; margin-top: 8px; transition: all 0.2s;
        }
        .auth-btn:hover { background: linear-gradient(135deg, #3b82f6, #2563eb); }
        .auth-toggle {
            text-align: center; margin-top: 16px;
            color: #6b7280; font-size: 13px;
        }
        .auth-toggle a {
            color: #60a5fa; cursor: pointer; text-decoration: underline;
        }
        #auth-error {
            color: #f87171; font-size: 12px;
            text-align: center; margin-top: 10px; min-height: 18px;
        }
 
        /* ─── メイン画面 ─── */
        #main-screen { display: none; }
 
        /* ヘッダー */
        .header {
            background: #111827;
            border-bottom: 1px solid #1e293b;
            padding: 12px 24px;
            display: flex; align-items: center; justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 16px; }
        .header-logo {
            color: #60a5fa; font-size: 18px;
            font-weight: bold; letter-spacing: 2px;
        }
        .header-logo span { color: #34d399; }
        .header-balance {
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 8px; padding: 6px 16px;
            font-size: 14px; color: #fbbf24; font-weight: bold;
        }
        .header-balance .yen { color: #f59e0b; font-size: 11px; margin-left: 2px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .user-email { color: #6b7280; font-size: 12px; }
        .logout-btn {
            padding: 6px 14px; background: #1e293b; color: #94a3b8;
            border: 1px solid #334155; border-radius: 6px;
            font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .logout-btn:hover { background: #334155; color: #e0e8f0; }
        .admin-badge {
            padding: 4px 10px; background: #7c3aed22; color: #a78bfa;
            border: 1px solid #7c3aed55; border-radius: 6px;
            font-size: 11px; font-weight: bold; letter-spacing: 1px;
        }
 
        /* タブナビ */
        .tab-nav {
            display: flex; background: #111827;
            border-bottom: 1px solid #1e293b;
            padding: 0 24px;
        }
        .tab-btn {
            padding: 12px 24px; background: none; border: none;
            color: #6b7280; font-size: 13px; cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s; letter-spacing: 1px;
        }
        .tab-btn:hover { color: #94a3b8; }
        .tab-btn.active {
            color: #60a5fa;
            border-bottom-color: #3b82f6;
        }
        .tab-btn.admin-tab {
            color: #a78bfa;
        }
        .tab-btn.admin-tab.active {
            color: #c4b5fd;
            border-bottom-color: #7c3aed;
        }
 
        /* コンテンツ */
        .content { padding: 20px 24px; max-width: 1200px; margin: 0 auto; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
 
        /* ─── マーケット ─── */
        .market-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 16px;
        }
        .market-header h2 { color: #e0e8f0; font-size: 18px; letter-spacing: 1px; }
        .market-time { color: #6b7280; font-size: 12px; }
 
        .stock-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 12px;
        }
        .stock-card {
            background: #111827;
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 16px 20px;
            transition: all 0.2s;
            cursor: pointer;
        }
        .stock-card:hover {
            border-color: #334155;
            box-shadow: 0 4px 16px #0004;
        }
        .stock-card.user-company {
            border-color: #1d4ed8;
            background: linear-gradient(135deg, #111827, #0f172a);
        }
        .stock-top {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 10px;
        }
        .stock-name { font-size: 15px; font-weight: bold; color: #e0e8f0; }
        .stock-ticker { color: #6b7280; font-size: 11px; margin-top: 2px; }
        .stock-badge {
            font-size: 9px; padding: 2px 8px;
            border-radius: 4px; font-weight: bold;
        }
        .badge-own {
            background: #1e3a5f; color: #60a5fa;
        }
        .badge-other {
            background: #3b1f4f; color: #c084fc;
        }
        .stock-price-row {
            display: flex; align-items: baseline; gap: 12px;
            margin-bottom: 10px;
        }
        .stock-price {
            font-size: 24px; font-weight: bold; color: #e0e8f0;
        }
        .stock-change { font-size: 13px; font-weight: bold; }
        .stock-change.up { color: #34d399; }
        .stock-change.down { color: #f87171; }
        .stock-change.flat { color: #6b7280; }
 
        /* ミニチャート（CSS） */
        .mini-chart {
            height: 40px; display: flex; align-items: flex-end;
            gap: 1px; margin-bottom: 12px;
        }
        .mini-chart .bar {
            flex: 1; border-radius: 1px 1px 0 0;
            min-width: 2px; transition: height 0.3s;
        }
        .mini-chart .bar.up { background: #34d399; }
        .mini-chart .bar.down { background: #f87171; }
        .mini-chart .bar.flat { background: #374151; }
 
        .stock-holding-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: #1e3a5f; color: #60a5fa;
            font-size: 11px; font-weight: bold;
            padding: 2px 8px; border-radius: 4px;
            margin-left: 6px;
        }
        .stock-holding-badge .holding-icon { font-size: 10px; }
 
        .stock-actions {
            display: flex; gap: 8px;
        }
        .buy-btn, .sell-btn {
            flex: 1; padding: 8px 0;
            border: none; border-radius: 6px;
            font-size: 12px; font-weight: bold;
            cursor: pointer; transition: all 0.15s;
            letter-spacing: 1px;
        }
        .buy-btn {
            background: #064e3b; color: #34d399;
            border: 1px solid #065f46;
        }
        .buy-btn:hover { background: #065f46; }
        .sell-btn {
            background: #450a0a; color: #f87171;
            border: 1px solid #7f1d1d;
        }
        .sell-btn:hover { background: #7f1d1d; }
 
        /* ─── 取引モーダル ─── */
        .modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000a; z-index: 200;
            align-items: center; justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 28px 32px;
            width: 100%; max-width: 420px;
            box-shadow: 0 12px 48px #000a;
        }
        .modal h3 {
            font-size: 18px; margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .modal h3.buy-title { color: #34d399; }
        .modal h3.sell-title { color: #f87171; }
        .modal-info {
            display: flex; justify-content: space-between;
            margin-bottom: 16px; padding: 10px 14px;
            background: #0f172a; border-radius: 8px;
        }
        .modal-info div { font-size: 13px; }
        .modal-info .label { color: #6b7280; font-size: 11px; margin-bottom: 2px; }
        .modal-info .value { color: #e0e8f0; font-weight: bold; }
        .qty-row {
            display: flex; align-items: center; gap: 10px;
            margin-bottom: 16px;
        }
        .qty-row label { color: #9ca3af; font-size: 13px; white-space: nowrap; }
        .qty-input {
            flex: 1; padding: 10px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #334155; border-radius: 8px;
            font-size: 16px; text-align: center;
        }
        .qty-input:focus { outline: none; border-color: #3b82f6; }
        .qty-presets {
            display: flex; gap: 6px; margin-bottom: 16px;
        }
        .qty-preset {
            flex: 1; padding: 6px; background: #0f172a;
            color: #9ca3af; border: 1px solid #1e293b;
            border-radius: 6px; font-size: 12px;
            cursor: pointer; text-align: center; transition: all 0.15s;
        }
        .qty-preset:hover { border-color: #3b82f6; color: #60a5fa; }
        .modal-total {
            text-align: center; margin-bottom: 20px;
            font-size: 13px; color: #9ca3af;
        }
        .modal-total .total-val {
            font-size: 22px; font-weight: bold;
            color: #fbbf24; display: block; margin-top: 4px;
        }
        .modal-btns { display: flex; gap: 10px; }
        .modal-cancel {
            flex: 1; padding: 12px;
            background: #374151; color: #9ca3af;
            border: none; border-radius: 8px;
            font-size: 14px; cursor: pointer;
        }
        .modal-cancel:hover { background: #4b5563; }
        .modal-confirm {
            flex: 1; padding: 12px;
            border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            letter-spacing: 1px;
        }
        .modal-confirm.buy {
            background: #065f46; color: #34d399;
        }
        .modal-confirm.buy:hover { background: #047857; }
        .modal-confirm.sell {
            background: #7f1d1d; color: #f87171;
        }
        .modal-confirm.sell:hover { background: #991b1b; }
 
        /* ─── ポートフォリオ ─── */
        .portfolio-summary {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px; margin-bottom: 20px;
        }
        .summary-card {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 10px; padding: 16px 20px;
        }
        .summary-card .label {
            color: #6b7280; font-size: 11px;
            letter-spacing: 1px; margin-bottom: 6px;
        }
        .summary-card .value {
            font-size: 22px; font-weight: bold;
        }
        .holdings-table {
            width: 100%; border-collapse: collapse;
            background: #111827; border-radius: 10px; overflow: hidden;
            border: 1px solid #1e293b;
        }
        .holdings-table th {
            background: #0f172a; color: #6b7280;
            font-size: 11px; letter-spacing: 1px;
            padding: 12px 16px; text-align: left;
        }
        .holdings-table td {
            padding: 12px 16px; border-top: 1px solid #1e293b;
            font-size: 13px;
        }
        .holdings-table tr:hover td { background: #1e293b22; }
        .pnl-positive { color: #34d399; font-weight: bold; }
        .pnl-negative { color: #f87171; font-weight: bold; }
 
        /* ─── 会社設立 ─── */
        .company-section {
            max-width: 600px; margin: 0 auto;
        }
        .company-section h2 {
            color: #e0e8f0; font-size: 18px;
            margin-bottom: 6px;
        }
        .company-section .desc {
            color: #6b7280; font-size: 13px;
            margin-bottom: 24px;
        }
        .company-form {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 12px; padding: 24px 28px;
        }
        .company-form .form-group { margin-bottom: 18px; }
        .company-form .form-group label {
            display: block; color: #9ca3af;
            font-size: 12px; margin-bottom: 6px;
        }
        .company-form .form-group input {
            width: 100%; padding: 10px 14px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #1e293b; border-radius: 8px;
            font-size: 14px;
        }
        .company-form .form-group input:focus {
            outline: none; border-color: #3b82f6;
        }
        .company-form .hint {
            color: #4b5563; font-size: 11px; margin-top: 4px;
        }
        .create-company-btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; border: none; border-radius: 8px;
            font-size: 15px; font-weight: bold;
            letter-spacing: 2px; cursor: pointer;
            transition: all 0.2s;
        }
        .create-company-btn:hover {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
        }
        .create-company-btn:disabled {
            background: #374151; color: #6b7280; cursor: not-allowed;
        }
        .company-status {
            margin-top: 20px; padding: 16px 20px;
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 10px;
        }
        .company-status h3 {
            color: #8b5cf6; font-size: 14px;
            margin-bottom: 8px;
        }
        .company-status p {
            color: #9ca3af; font-size: 13px;
            line-height: 1.6;
        }
 
        /* ─── 取引履歴 ─── */
        .history-table {
            width: 100%; border-collapse: collapse;
            background: #111827; border-radius: 10px; overflow: hidden;
            border: 1px solid #1e293b;
        }
        .history-table th {
            background: #0f172a; color: #6b7280;
            font-size: 11px; letter-spacing: 1px;
            padding: 12px 16px; text-align: left;
        }
        .history-table td {
            padding: 10px 16px; border-top: 1px solid #1e293b;
            font-size: 12px;
        }
        .history-table .type-buy { color: #34d399; font-weight: bold; }
        .history-table .type-sell { color: #f87171; font-weight: bold; }
 
        /* ─── 通知トースト ─── */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1e293b; border: 1px solid #334155;
            border-radius: 10px; padding: 14px 20px;
            color: #e0e8f0; font-size: 13px;
            box-shadow: 0 8px 32px #000a;
            transform: translateY(100px); opacity: 0;
            transition: all 0.3s; z-index: 300;
            max-width: 360px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-left: 3px solid #34d399; }
        .toast.error { border-left: 3px solid #f87171; }
 
        /* ─── マーケットサブタブ ─── */
        .market-sub-tabs {
            display: flex; gap: 8px; margin-bottom: 16px;
        }
        .market-sub-tab {
            padding: 8px 20px;
            background: #1e293b; color: #6b7280;
            border: 1px solid #334155; border-radius: 8px;
            font-size: 13px; cursor: pointer;
            transition: all 0.2s; letter-spacing: 0.5px;
        }
        .market-sub-tab:hover { color: #94a3b8; border-color: #475569; }
        .market-sub-tab.active {
            background: #1e3a5f; color: #60a5fa;
            border-color: #3b82f6;
        }
        .market-sub-tab .tab-count {
            font-size: 11px; color: #4b5563;
            margin-left: 4px;
        }
        .market-sub-tab.active .tab-count { color: #60a5fa88; }
 
        /* ─── ログインボーナス ─── */
        .bonus-modal-overlay {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000a; z-index: 250;
            align-items: center; justify-content: center;
        }
        .bonus-modal-overlay.show { display: flex; }
        .bonus-modal {
            background: linear-gradient(135deg, #1e293b, #111827);
            border: 2px solid #fbbf24;
            border-radius: 16px;
            padding: 32px 40px;
            text-align: center;
            box-shadow: 0 0 60px #fbbf2433;
            max-width: 380px; width: 100%;
        }
        .bonus-icon { font-size: 48px; margin-bottom: 12px; }
        .bonus-title {
            color: #fbbf24; font-size: 20px;
            font-weight: bold; margin-bottom: 8px;
            letter-spacing: 2px;
        }
        .bonus-amount {
            color: #f59e0b; font-size: 32px;
            font-weight: bold; margin-bottom: 6px;
        }
        .bonus-desc {
            color: #9ca3af; font-size: 13px;
            margin-bottom: 20px;
        }
        .bonus-close-btn {
            padding: 10px 40px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #111827; border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
            letter-spacing: 1px;
        }
        .bonus-close-btn:hover { background: linear-gradient(135deg, #fbbf24, #f59e0b); }

        /* ─── 管理者画面 ─── */
        .admin-header {
            display: flex; align-items: center; gap: 14px;
            margin-bottom: 24px; padding-bottom: 16px;
            border-bottom: 1px solid #2d1f5e;
        }
        .admin-header h2 {
            color: #c4b5fd; font-size: 20px; letter-spacing: 1px;
        }
        .admin-header .admin-icon { font-size: 24px; }
        .admin-sections {
            display: flex; flex-direction: column; gap: 24px;
        }
        .admin-section {
            background: #111827; border: 1px solid #1e293b;
            border-radius: 12px; padding: 20px 24px;
        }
        .admin-section.danger-zone {
            border-color: #7f1d1d;
        }
        .admin-section h3 {
            font-size: 14px; letter-spacing: 1px;
            margin-bottom: 16px; padding-bottom: 10px;
            border-bottom: 1px solid #1e293b;
            display: flex; align-items: center; gap: 8px;
        }
        .admin-section h3.purple { color: #a78bfa; border-bottom-color: #2d1f5e; }
        .admin-section h3.red { color: #f87171; border-bottom-color: #7f1d1d; }
        .admin-section h3.yellow { color: #fbbf24; border-bottom-color: #451a03; }
        .admin-section h3.green { color: #34d399; border-bottom-color: #064e3b; }

        .admin-player-list {
            display: flex; flex-direction: column; gap: 10px;
        }
        .admin-player-row {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 16px;
            background: #0f172a; border: 1px solid #1e293b;
            border-radius: 8px;
        }
        .admin-player-row:hover { border-color: #334155; }
        .admin-player-email {
            flex: 1; font-size: 13px; color: #e0e8f0;
        }
        .admin-player-balance {
            font-size: 12px; color: #fbbf24; font-weight: bold;
            min-width: 120px; text-align: right;
        }
        .admin-player-actions {
            display: flex; gap: 6px;
        }
        .admin-btn {
            padding: 5px 12px; border: none; border-radius: 6px;
            font-size: 11px; font-weight: bold;
            cursor: pointer; transition: all 0.15s; letter-spacing: 0.5px;
        }
        .admin-btn.warn {
            background: #451a0322; color: #fbbf24;
            border: 1px solid #78350f;
        }
        .admin-btn.warn:hover { background: #78350f; }
        .admin-btn.money-up {
            background: #064e3b22; color: #34d399;
            border: 1px solid #065f46;
        }
        .admin-btn.money-up:hover { background: #065f46; }
        .admin-btn.money-down {
            background: #450a0a22; color: #f87171;
            border: 1px solid #7f1d1d;
        }
        .admin-btn.money-down:hover { background: #7f1d1d; }
        .admin-btn.delete {
            background: #1f2937; color: #6b7280;
            border: 1px solid #374151;
        }
        .admin-btn.delete:hover { background: #7f1d1d22; color: #f87171; border-color: #7f1d1d; }

        .admin-add-section {
            display: flex; gap: 10px; align-items: flex-end;
            flex-wrap: wrap;
        }
        .admin-add-section .form-group {
            flex: 1; min-width: 160px; margin-bottom: 0;
        }
        .admin-add-section .form-group label {
            display: block; color: #6b7280;
            font-size: 11px; margin-bottom: 6px;
        }
        .admin-add-section .form-group input {
            width: 100%; padding: 9px 12px;
            background: #0f172a; color: #e0e8f0;
            border: 1px solid #1e293b; border-radius: 8px;
            font-size: 13px;
        }
        .admin-add-btn {
            padding: 10px 24px;
            background: linear-gradient(135deg, #7c3aed, #6d28d9);
            color: #fff; border: none; border-radius: 8px;
            font-size: 13px; font-weight: bold;
            cursor: pointer; transition: all 0.2s;
            white-space: nowrap;
        }
        .admin-add-btn:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }

        .admin-refresh-btn {
            padding: 6px 16px;
            background: #1e293b; color: #94a3b8;
